version: '3.8'
networks:
  med-network:
    driver: bridge
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/med_db
    depends_on:
      db:
        condition: service_healthy
    networks:
        - med-network
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: med_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d med_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - med-network